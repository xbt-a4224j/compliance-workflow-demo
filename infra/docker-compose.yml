services:
  postgres:
    image: postgres:16
    container_name: compliance-workflow-demo-postgres
    environment:
      POSTGRES_USER: compliance
      POSTGRES_PASSWORD: compliance
      POSTGRES_DB: compliance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compliance -d compliance"]
      interval: 5s
      timeout: 2s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: compliance-workflow-demo-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC (app → jaeger)
      - "4318:4318"     # OTLP HTTP (fallback)
    restart: unless-stopped

volumes:
  pgdata:
